<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="深域万象站点入口">
  <title>深域万象</title>
  <style>
    :root { color: #111827; background: #f7f8fc; font-family: "PingFang SC", "Microsoft YaHei", Inter, system-ui, sans-serif; }
    * { box-sizing: border-box; }
    body { min-width: 320px; min-height: 100vh; margin: 0; display: grid; place-items: center; padding: 24px; }
    main { width: min(100%, 760px); padding: clamp(32px, 8vw, 72px); border: 1px solid #e8eaf2; border-radius: 24px; background: #fff; box-shadow: 0 18px 44px rgba(43, 49, 95, .12); }
    .eyebrow { margin: 0 0 14px; color: #6957ff; font-size: 13px; font-weight: 700; letter-spacing: .12em; }
    h1 { margin: 0; font-size: clamp(36px, 7vw, 60px); line-height: 1.08; }
    p { max-width: 560px; margin: 20px 0 0; color: #6b7280; font-size: 16px; line-height: 1.7; }
    nav { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; margin-top: 36px; }
    a { display: block; padding: 22px; border: 1px solid #e8eaf2; border-radius: 16px; color: inherit; text-decoration: none; transition: transform 140ms cubic-bezier(.2, .8, .2, 1), border-color 140ms ease, box-shadow 140ms ease; }
    a:hover { transform: translateY(-2px); border-color: #6957ff; box-shadow: 0 10px 24px rgba(105, 87, 255, .14); }
    a:focus-visible { outline: 3px solid rgba(105, 87, 255, .35); outline-offset: 3px; }
    a strong, a span { display: block; }
    a strong { font-size: 18px; }
    a span { margin-top: 7px; color: #6b7280; font-size: 14px; line-height: 1.5; }
    @media (max-width: 560px) { nav { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">DEEPDIVE AI</p>
    <h1>深域万象</h1>
    <p>请选择要访问的工作入口。</p>
    <nav aria-label="站点入口">
      <a href="./user/"><strong>用户端</strong><span>AI 电商商品视觉创作工作台</span></a>
      <a href="./admin/"><strong>管理端</strong><span>管理端建设状态与后续入口</span></a>
    </nav>
  </main>
</body>
</html>
